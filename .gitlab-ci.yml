image: node:20

# Кеширование node_modules для ускорения последующих запусков
cache:
  key:
    files:
      - frontend/package-lock.json
      - backend/package-lock.json
  paths:
    - node_modules/
    - frontend/node_modules/
    - backend/node_modules/
    - .npm/

before_script:
  # Настраиваем локальную папку кэша для npm
  - npm config set cache .npm --global

stages:
  - install
  - test
  - build
  - deploy

# Шаг 1: Установка зависимостей для всех компонентов
install_dependencies:
  stage: install
  script:
    - npm run install:all
  artifacts:
    paths:
      - node_modules/
      - frontend/node_modules/
      - backend/node_modules/
    expire_in: 1 hour

# Шаг 2: Проверка качества кода (Линтинг)
lint:
  stage: test
  dependencies:
    - install_dependencies
  script:
    - npm run lint

# Шаг 3: Модульные тесты бэкенда
test_backend:
  stage: test
  dependencies:
    - install_dependencies
  script:
    - npm run test --prefix backend

# Шаг 4: Модульные тесты фронтенда
test_frontend:
  stage: test
  dependencies:
    - install_dependencies
  script:
    - npm run test --prefix frontend

# Шаг 5: Интеграционные E2E-тесты (Playwright)
test_e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.61.0-noble
  dependencies:
    - install_dependencies
  script:
    - node -v
    - npm run test:e2e
  artifacts:
    name: "playwright-report-$CI_COMMIT_REF_SLUG"
    paths:
      - playwright-report/
      - test-results/
    when: always
    expire_in: 1 week

# Шаг 6: Сборка фронтенда (React + Vite)
build_frontend:
  stage: build
  dependencies:
    - install_dependencies
  script:
    - cd frontend
    - npm run build
  artifacts:
    name: "frontend-build-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/dist/
    expire_in: 1 week

# Шаг 7: Сборка бэкенда (TypeScript)
build_backend:
  stage: build
  dependencies:
    - install_dependencies
  script:
    - cd backend
    - npm run build
  artifacts:
    name: "backend-build-$CI_COMMIT_REF_SLUG"
    paths:
      - backend/dist/
    expire_in: 1 week

# Шаг 8: Автодеплой фронтенда на Vercel (только для ветки main)
deploy_vercel:
  stage: deploy
  image: node:20
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - npm install -g vercel
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN


